<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="color-scheme" content="light dark">
    <title>wordoku</title>
    <link rel="icon" href="data:,">
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <main class="shell">
      <section class="app">
        <header class="topbar">
          <div>
            <p class="eyebrow">単語ごとの発音練習</p>
            <h1>wordoku</h1>
          </div>
          <button id="settingsButton" class="icon-button" type="button" aria-expanded="false">
            設定
          </button>
        </header>

        <section class="practice-panel">
          <div id="progressPanel" class="status-strip">
            <div>
              <span class="muted">現在の単語</span>
              <strong id="currentWord">未選択</strong>
            </div>
            <div>
              <span class="muted">進捗</span>
              <strong id="progressText">0 / 0</strong>
            </div>
            <div>
              <span class="muted">音声</span>
              <strong id="sourceText">準備完了</strong>
            </div>
          </div>

          <div class="playbar" aria-label="再生操作">
            <div class="mode-switch" aria-label="再生モード">
              <button id="manualModeButton" class="mode-button" type="button">単語ごと</button>
              <button id="autoModeButton" class="mode-button" type="button">連続</button>
            </div>
            <button id="prevButton" class="button secondary compact-button" type="button" aria-label="前の単語">←</button>
            <button id="playButton" class="button primary" type="button">再生</button>
            <button id="nextButton" class="button secondary compact-button" type="button" aria-label="次の単語">→</button>
            <button id="pauseButton" class="button secondary" type="button">一時停止</button>
            <button id="stopButton" class="button secondary" type="button">停止</button>
          </div>

          <section class="editor-panel" aria-label="練習テキスト">
            <div
              id="textInput"
              class="text-editor"
              contenteditable="true"
              spellcheck="false"
              role="textbox"
              aria-multiline="true"
              data-placeholder="英語またはロシア語の文章を貼り付けてください"
            ></div>
          </section>
        </section>
      </section>
    </main>

    <div id="settingsBackdrop" class="settings-backdrop" hidden></div>
    <aside id="settingsPanel" class="settings-panel" aria-hidden="true" aria-label="設定">
      <div class="settings-header">
        <h2>設定</h2>
        <button id="settingsCloseButton" class="icon-button subtle" type="button">閉じる</button>
      </div>

      <div class="settings-content">
        <label class="field">
          <span>言語</span>
          <select id="languageSelect">
            <option value="en-US">英語（アメリカ）</option>
            <option value="en-GB">英語（イギリス）</option>
            <option value="ru-RU">ロシア語</option>
          </select>
        </label>

        <label class="field">
          <span>音声ソース</span>
          <select id="sourceSelect">
            <option value="auto">発音ライブラリ優先、なければブラウザTTS</option>
            <option value="library">発音ライブラリのみ</option>
            <option value="speech">ブラウザTTSのみ</option>
          </select>
        </label>

        <label class="field">
          <span>ブラウザ音声</span>
          <select id="voiceSelect"></select>
        </label>

        <label class="field">
          <span>再生順</span>
          <select id="orderSelect">
            <option value="normal">文章順に進む</option>
            <option value="repeat">選択単語を繰り返す</option>
          </select>
        </label>

        <div class="range-grid">
          <label class="range-field">
            <span>音声速度 <strong id="speedValue">0.90x</strong></span>
            <input id="speedRange" type="range" min="0.55" max="1.35" value="0.9" step="0.05">
          </label>

          <label class="range-field">
            <span>発音前の待ち時間 <strong id="delayValue">1.0秒</strong></span>
            <input id="delayRange" type="range" min="0" max="3" value="1" step="0.1">
          </label>

          <label class="range-field">
            <span>先読み単語数 <strong id="preloadValue">5個</strong></span>
            <input id="preloadRange" type="range" min="0" max="10" value="5" step="1">
          </label>
        </div>

        <div class="switch-row">
          <label class="switch">
            <input id="autoToggle" type="checkbox" checked>
            <span>単語を自動で続けて再生する</span>
          </label>
          <label class="switch">
            <input id="normalizeToggle" type="checkbox" checked>
            <span>同じ単語の音声キャッシュを共有する</span>
          </label>
        </div>

        <label class="field">
          <span>テーマ</span>
          <select id="themeSelect">
            <option value="auto">OS設定に合わせる</option>
            <option value="light">ライト</option>
            <option value="dark">ダーク</option>
          </select>
        </label>
      </div>
    </aside>

    <script src="script.js"></script>
  </body>
</html>
